<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>B级汇总排位</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;padding:12px}
h2{text-align:center;font-size:18px;margin-bottom:12px;color:#f8fafc}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:600px}
th,td{padding:8px 6px;text-align:center;white-space:nowrap;border-bottom:1px solid #1e293b}
th{background:#1e293b;position:sticky;top:0;z-index:2;font-weight:600;color:#94a3b8}
th:first-child,td:first-child{position:sticky;left:0;background:#0f172a;z-index:1;text-align:left;padding-left:10px}
th:first-child{z-index:3;background:#1e293b}
td:first-child{color:#94a3b8;font-size:12px}
td.red{color:#ef4444;font-weight:700}
td.green{color:#22c55e}
.loading{text-align:center;padding:40px;color:#64748b}
.error{text-align:center;padding:40px;color:#ef4444}
.summary-row td{background:#1e293b;font-weight:600;border-top:2px solid #334155}
</style>
</head>
<body>
<h2>B级汇总 · 每日排位</h2>
<div id="app"><div class="loading">加载中...</div></div>

<script>
const API = '/funds-v2/api/funds/data';
const RED_THRESHOLD = 25;
const STORE_ORDER = ['一店','二店','三店','四店','五店','六店'];

async function load() {
  try {
    // 尝试用已登录session（当前页面在funds-v2域下）
    let token = localStorage.getItem('funds_token');
    let headers = token ? { 'Authorization': 'Bearer ' + token } : {};
    let resp = await fetch(API, { headers });
    if (resp.status === 401) {
      // 未登录，用外部API key
      resp = await fetch('/funds-v2/api/external/push', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-API-Key': 'funds-v2-ext-2026' },
        body: '{}'
      });
      // 如果external push可用，说明API key有效，尝试拿数据
      let dataResp = await fetch('/funds-v2/api/funds/data');
      if (dataResp.status === 200) {
        render(await dataResp.json());
        return;
      }
      document.getElementById('app').innerHTML = '<div class="error">请先登录 funds-v2</div>';
      return;
    }
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    render(await resp.json());
  } catch(e) {
    document.getElementById('app').innerHTML = '<div class="error">加载失败: ' + e.message + '</div>';
  }
}

function render(data) {
  const records = (data.records || []).filter(r => r.id && r.id.includes('B级汇总'));

  // 按日期分组
  const byDate = {};
  for (const r of records) {
    if (!byDate[r.date]) byDate[r.date] = {};
    byDate[r.date][r.store] = r.amount;
  }

  const dates = Object.keys(byDate).sort().reverse();
  if (!dates.length) {
    document.getElementById('app').innerHTML = '<div class="error">暂无B级汇总数据</div>';
    return;
  }

  // 计算各门店合计
  const totals = {};
  for (const s of STORE_ORDER) totals[s] = 0;
  for (const d of dates) {
    for (const s of STORE_ORDER) {
      totals[s] += (byDate[d][s] || 0);
    }
  }

  let html = '<div class="table-wrap"><table>';
  html += '<thead><tr><th>日期</th>';
  for (const s of STORE_ORDER) html += `<th>${s}</th>`;
  html += '</tr></thead><tbody>';

  for (const d of dates) {
    html += `<tr><td>${d.slice(5)}</td>`;
    for (const s of STORE_ORDER) {
      const v = byDate[d][s] !== undefined ? byDate[d][s] : '';
      if (v === '') { html += '<td>-</td>'; continue; }
      const cls = v > RED_THRESHOLD ? 'red' : 'green';
      html += `<td class="${cls}">${Number(v).toLocaleString()}</td>`;
    }
    html += '</tr>';
  }

  // 合计行
  html += '<tr class="summary-row"><td>合计</td>';
  for (const s of STORE_ORDER) {
    const v = totals[s];
    const cls = v > RED_THRESHOLD ? 'red' : 'green';
    html += `<td class="${cls}">${Number(v).toLocaleString()}</td>`;
  }
  html += '</tr>';

  html += '</tbody></table></div>';
  document.getElementById('app').innerHTML = html;
}

load();
</script>
</body>
</html>
